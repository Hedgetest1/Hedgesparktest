# HedgeSpark Sentry alert rules — Infrastructure-as-Code
#
# Declarative source of truth for Sentry issue-alert rules. Synced via
# `scripts/sentry_sync_alert_rules.py` (dry-run by default) which calls
# the Sentry REST API to create / update / delete rules so the live
# Sentry org matches what's in this file.
#
# Drift protection: `scripts/audit_sentry_alert_rules_drift.py` blocks
# any commit that changes this YAML without re-running the sync. The
# applied state is hashed in `sentry_alert_rules.applied.lock` next to
# this file.
#
# Tier: TIER_0 (configuration, no code path).
#
# Schema reference (Sentry Issue Alert API):
#   https://docs.sentry.io/api/alerts/create-an-issue-alert-rule-for-a-project/
#
# Each rule:
#   name        — human-readable, MUST be unique within project (used as identity)
#   action_match— "all" or "any" (all conditions must match vs at least one)
#   filter_match— same, but for filters
#   conditions  — list of trigger conditions (issue events)
#   filters     — list of filters (tags, environment, etc.)
#   actions     — what happens when triggered (notify channel, etc.)
#   frequency   — minutes between repeated firings on the same issue (default 30)
#   environment — optional, scope to a single environment
#
# Adding a rule:
#   1. Edit this file.
#   2. Run `./venv/bin/python scripts/sentry_sync_alert_rules.py --apply`
#      (requires SENTRY_AUTH_TOKEN + SENTRY_ORG + SENTRY_PROJECT).
#   3. The script updates `sentry_alert_rules.applied.lock` with the new
#      content hash. Drift audit then passes again.

rules:
  - name: "production_error_burst"
    description: "≥10 errors in 5min on production. Catches incident-level spikes early."
    actionMatch: "all"
    filterMatch: "all"
    frequency: 30
    conditions:
      - id: "sentry.rules.conditions.event_frequency.EventFrequencyCondition"
        value: 10
        interval: "5m"
        comparisonType: "count"
    filters:
      - id: "sentry.rules.filters.tagged_event.TaggedEventFilter"
        key: "environment"
        match: "eq"
        value: "production"
    actions:
      - id: "sentry.mail.actions.NotifyEmailAction"
        targetType: "IssueOwners"
        targetIdentifier: ""

  - name: "regression_alert"
    description: "Issue marked as regression by Sentry. Page immediately — something we previously fixed re-broke."
    actionMatch: "all"
    filterMatch: "all"
    frequency: 5
    conditions:
      - id: "sentry.rules.conditions.regression_event.RegressionEventCondition"
    filters: []
    actions:
      - id: "sentry.mail.actions.NotifyEmailAction"
        targetType: "IssueOwners"
        targetIdentifier: ""

  - name: "pii_scrub_spike"
    description: "≥5 events tagged sentry.pii_scrubbed=true in 1h. PII guard regex hit — investigate the source path."
    actionMatch: "all"
    filterMatch: "all"
    frequency: 60
    conditions:
      - id: "sentry.rules.conditions.event_frequency.EventFrequencyCondition"
        value: 5
        interval: "1h"
        comparisonType: "count"
    filters:
      - id: "sentry.rules.filters.tagged_event.TaggedEventFilter"
        key: "sentry.pii_scrubbed"
        match: "eq"
        value: "true"
    actions:
      - id: "sentry.mail.actions.NotifyEmailAction"
        targetType: "IssueOwners"
        targetIdentifier: ""

  - name: "billing_path_critical"
    description: "Any error in /billing/* — payment flows can't fail silently. Page on first event."
    actionMatch: "all"
    filterMatch: "all"
    frequency: 5
    conditions:
      - id: "sentry.rules.conditions.first_seen_event.FirstSeenEventCondition"
    filters:
      - id: "sentry.rules.filters.tagged_event.TaggedEventFilter"
        key: "route"
        match: "co"
        value: "/billing/"
    actions:
      - id: "sentry.mail.actions.NotifyEmailAction"
        targetType: "IssueOwners"
        targetIdentifier: ""

  - name: "auth_path_critical"
    description: "Any error in /auth/* — Shopify install/session flow break = merchant onboarding stops. Page on first event."
    actionMatch: "all"
    filterMatch: "all"
    frequency: 5
    conditions:
      - id: "sentry.rules.conditions.first_seen_event.FirstSeenEventCondition"
    filters:
      - id: "sentry.rules.filters.tagged_event.TaggedEventFilter"
        key: "route"
        match: "co"
        value: "/auth/"
    actions:
      - id: "sentry.mail.actions.NotifyEmailAction"
        targetType: "IssueOwners"
        targetIdentifier: ""

  - name: "worker_error_burst"
    description: "≥5 errors with component matching worker (any of 6 PM2 singletons) in 15min. Worker degradation early signal."
    actionMatch: "all"
    filterMatch: "any"
    frequency: 30
    conditions:
      - id: "sentry.rules.conditions.event_frequency.EventFrequencyCondition"
        value: 5
        interval: "15m"
        comparisonType: "count"
    filters:
      - id: "sentry.rules.filters.tagged_event.TaggedEventFilter"
        key: "component"
        match: "co"
        value: "worker"
    actions:
      - id: "sentry.mail.actions.NotifyEmailAction"
        targetType: "IssueOwners"
        targetIdentifier: ""
