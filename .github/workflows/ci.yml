name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # -------------------------------------------------------------------
  # Backend: install pinned deps → run pytest
  # -------------------------------------------------------------------
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: wishspark_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/wishspark_test
      REDIS_URL: redis://localhost:6379/0
      MERCHANT_SESSION_SECRET: ci-test-session-secret-32chars!!
      SHOPIFY_API_SECRET: ci-test-shopify-secret
      MERCHANT_TOKEN_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      SHOPIFY_WEBHOOK_SECRET: ci-test-webhook-secret
      ALLOW_INSECURE_DEV: "false"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Create database tables
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # -------------------------------------------------------------------
  # Dashboard: install → type check → build
  # -------------------------------------------------------------------
  dashboard-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
