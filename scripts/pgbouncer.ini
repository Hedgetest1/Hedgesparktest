; PgBouncer connection pooler configuration for WishSpark / HedgeSpark
;
; PURPOSE
; -------
; Without PgBouncer, each FastAPI worker process holds up to pool_size=10
; connections directly to Postgres.  With PM2 running 2+ processes plus
; background workers, the total connection count can reach 60-80, approaching
; Postgres's default limit of 100.
;
; PgBouncer in transaction mode drops the real Postgres connection count to
; the number of CONCURRENTLY ACTIVE transactions, which for a dashboard app
; is typically 2-5.  All FastAPI workers connect to PgBouncer (port 6432)
; rather than Postgres directly.
;
; DEPLOY STEPS
; ------------
; 1. Install:
;      sudo apt-get install pgbouncer
;
; 2. Copy this file:
;      sudo cp /opt/wishspark/scripts/pgbouncer.ini /etc/pgbouncer/pgbouncer.ini
;
; 3. Configure userlist.txt (add WishSpark DB user + hashed password):
;      sudo vi /etc/pgbouncer/userlist.txt
;      # Format: "username" "md5<hash>" or SCRAM password
;
; 4. Start / restart:
;      sudo systemctl enable pgbouncer
;      sudo systemctl restart pgbouncer
;
; 5. Update backend/.env:
;      # Change DATABASE_URL from:
;      DATABASE_URL=postgresql://user:pass@localhost:5432/wishspark
;      # To:
;      DATABASE_URL=postgresql://user:pass@localhost:6432/wishspark
;
; 6. Reload backend:
;      pm2 reload ecosystem.config.js
;
; 7. Also reduce SQLAlchemy pool_size in database.py to 3 (PgBouncer owns the pool):
;      pool_size=3, max_overflow=5
;
; VERIFICATION
; ------------
;      psql postgresql://user:pass@localhost:6432/pgbouncer -c "SHOW POOLS;"
;

[databases]
; Replace with your actual Postgres connection details
wishspark = host=127.0.0.1 port=5432 dbname=wishspark

[pgbouncer]
listen_port = 6432
listen_addr = 127.0.0.1

; transaction mode: connection returned to pool after each transaction.
; session mode would negate most of PgBouncer's benefit for a stateless API.
pool_mode = transaction

; Maximum real Postgres connections PgBouncer will open.
; With transaction pooling, this supports far more concurrent app connections.
max_client_conn = 200
default_pool_size = 20

; Reserve connections for admin queries
reserve_pool_size = 5
reserve_pool_timeout = 3

; Log connections and disconnections at INFO level
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Keepalive settings
server_idle_timeout = 600
client_idle_timeout = 0

; Auth — use md5 or scram-sha-256 (match your Postgres pg_hba.conf)
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Admin access (for SHOW POOLS etc.)
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
