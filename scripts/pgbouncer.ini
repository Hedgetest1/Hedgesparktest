; PgBouncer connection pooler configuration for WishSpark / HedgeSpark
;
; ⚠️ SOURCE OF TRUTH for the 10k-merchant concurrency envelope.
; This file is the version-controlled mirror of the LIVE tuned config
; at /etc/pgbouncer/pgbouncer.ini. The c=768 0-error dashboard
; envelope (proven 2026-05-15b) DEPENDS on default_pool_size=80 /
; max_db_connections=150 / max_client_conn=5000. If a server rebuild
; `sudo cp`s this file and it has drifted to the old defaults, the
; entire 10k envelope silently collapses back to the c≈64 pool-timeout
; cliff. Keep this file == live. Drift is detected by
; backend/scripts/audit_pgbouncer_config_drift.py (preflight,
; degrade-open when /etc copy is unreadable / not this host).
;
; PURPOSE
; -------
; Without PgBouncer each uvicorn worker holds up to pool_size direct
; Postgres connections. With 8 uvicorn workers + 7 singleton PM2
; workers the count approaches Postgres max_connections=200. PgBouncer
; in transaction mode multiplexes thousands of app connections onto a
; small bounded set of real Postgres server connections.
;
; DEPLOY STEPS
; ------------
; 1. Install:    sudo apt-get install pgbouncer
; 2. Copy this:  sudo cp /opt/wishspark/scripts/pgbouncer.ini \
;                        /etc/pgbouncer/pgbouncer.ini
;    Then FIX OWNERSHIP (privilege-dropped svc-user must read it —
;    a root-owned copy = pgbouncer fails to start, see
;    feedback_root_edit_breaks_service_config_perms):
;      sudo chown postgres:postgres /etc/pgbouncer/pgbouncer.ini
;      sudo chmod 640 /etc/pgbouncer/pgbouncer.ini
; 3. userlist.txt (NOT version-controlled — secrets):
;      sudo vi /etc/pgbouncer/userlist.txt   # "aiuser" "<scram/md5>"
; 4. sudo systemctl enable pgbouncer && sudo systemctl restart pgbouncer
; 5. backend/.env DATABASE_URL points at port 6432 (PgBouncer), e.g.
;      DATABASE_URL=postgresql://aiuser:...@127.0.0.1:6432/wishspark
; 6. pm2 reload ecosystem.config.js
;
; NOTE: backend/app/core/database.py keeps pool_size=50 /
; max_overflow=100 (CLAUDE.md §6 DB pool math, post-8-worker Stage 4).
; The earlier "reduce pool_size to 3" instruction was REMOVED 2026-05-16
; — it contradicted the documented doctrine and would have starved the
; app-side pool. PgBouncer owns the SERVER-side pool; the app-side pool
; still sizes for in-flight concurrency per worker.
;
; VERIFICATION
; ------------
;   psql postgresql://aiuser:...@127.0.0.1:6432/pgbouncer -c "SHOW POOLS;"
;   psql ... -c "SHOW DATABASES;"   # confirm pool_size per-db == 80
;

[databases]
wishspark = host=127.0.0.1 port=5432 dbname=wishspark
; wishspark_test = pytest-only DB (hermetic tests run against live PG).
wishspark_test = host=127.0.0.1 port=5432 dbname=wishspark_test

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

; transaction mode: connection returned to pool after each transaction.
; session mode would negate most of PgBouncer's benefit for a stateless
; API and would break the SET LOCAL request-timeout reset semantics.
pool_mode = transaction

; ── 10k concurrency envelope (DO NOT lower without re-proving) ──────
; default_pool_size : server conns per (db,user) — the c=768 envelope.
; max_db_connections: GLOBAL server-conn ceiling across all pools;
;                     150 < Postgres max_connections=200 (leaves
;                     headroom for migrations + admin + wishspark_test).
; max_client_conn   : app-side accepted connections (8 workers ×
;                     (pool 50 + overflow 100) = 1200 ≪ 5000).
; reserve_pool_*    : burst slots when default pool is exhausted.
default_pool_size = 80
max_db_connections = 150
max_client_conn = 5000
reserve_pool_size = 15
reserve_pool_timeout = 5

; Connection lifecycle. server_idle_timeout=600 is the contract
; database.py pool_recycle=240 stays UNDER (so a recycled app conn is
; never handed a PgBouncer-side server conn that was idle-killed).
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
client_login_timeout = 60
autodb_idle_timeout = 3600

; Required: the app issues `SET extra_float_digits` on connect;
; under transaction pooling PgBouncer must be told to ignore it as a
; startup parameter or every connection errors.
ignore_startup_parameters = extra_float_digits

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Auth — must match /etc/pgbouncer/userlist.txt and Postgres pg_hba.conf
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Admin / stats access for SHOW POOLS / SHOW DATABASES
admin_users = aiuser
stats_users = aiuser
